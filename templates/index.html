<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        homarr: {
                            100: '#E4E4E7',
                            200: '#A1A1AA',
                            300: '#71717A',
                            400: '#52525B',
                            500: '#3F3F46',
                            600: '#27272A',
                            700: '#18181B',
                            800: '#121212',
                            900: '#0A0A0A',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #3F3F46; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #A1A1AA; cursor: pointer; }
    </style>
</head>
<body class="bg-homarr-900 text-homarr-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-homarr-700 rounded-2xl p-6 shadow-2xl border border-homarr-600 space-y-5">
            <div class="text-center">
                <h1 class="text-2xl font-bold text-homarr-100">Unit Converter</h1>
                <p class="text-homarr-300 text-sm mt-1">Convert between different units</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Category</label>
                    <select id="category" class="w-full bg-homarr-600 border border-homarr-500 text-homarr-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-homarr-300 focus:ring-1 focus:ring-homarr-300 transition-all"></select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Value</label>
                    <input type="number" id="fromValue" class="w-full bg-homarr-600 border border-homarr-500 text-homarr-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-homarr-300 focus:ring-1 focus:ring-homarr-300 transition-all placeholder-homarr-400" placeholder="Enter value">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-homarr-200 mb-2">From</label>
                        <select id="fromUnit" class="w-full bg-homarr-600 border border-homarr-500 text-homarr-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-homarr-300 focus:ring-1 focus:ring-homarr-300 transition-all"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-homarr-200 mb-2">To</label>
                        <select id="toUnit" class="w-full bg-homarr-600 border border-homarr-500 text-homarr-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-homarr-300 focus:ring-1 focus:ring-homarr-300 transition-all"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Result</label>
                    <div class="relative">
                        <div id="result" class="w-full bg-homarr-600 border border-homarr-500 text-homarr-100 rounded-lg px-4 py-3 text-base font-semibold pr-10">-</div>
                        <button id="copyBtn" class="absolute right-2 top-1/2 -translate-y-1/2 text-homarr-300 hover:text-homarr-100 transition-colors p-1" title="Copy result">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <button id="convertBtn" class="w-full bg-homarr-500 hover:bg-homarr-400 text-homarr-100 font-semibold rounded-lg px-4 py-3 text-sm transition-all hover:scale-[1.02] active:scale-[0.98]">
                Convert
            </button>
            <button id="settingsBtn" class="w-full bg-transparent border border-homarr-500 hover:bg-homarr-600 text-homarr-200 font-medium rounded-lg px-4 py-2 text-sm transition-all">
                Settings
            </button>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-homarr-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-homarr-600">
            <h2 class="text-xl font-bold text-homarr-100 mb-5">Settings</h2>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Background Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="bgColor" class="w-12 h-12 rounded-lg cursor-pointer border-2 border-homarr-500" value="#18181B">
                        <span id="bgColorHex" class="text-homarr-300 text-sm font-mono">#18181B</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Text Color</label>
                    <div class="flex items-center gap-3">
                        <input type="color" id="textColor" class="w-12 h-12 rounded-lg cursor-pointer border-2 border-homarr-500" value="#E4E4E7">
                        <span id="textColorHex" class="text-homarr-300 text-sm font-mono">#E4E4E7</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Font Family</label>
                    <select id="fontFamily" class="w-full bg-homarr-600 border border-homarr-500 text-homarr-100 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-homarr-300">
                        <option value="system-ui, -apple-system, sans-serif">System Default</option>
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="serif">Serif</option>
                        <option value="monospace">Monospace</option>
                        <option value="'Georgia', serif">Georgia</option>
                        <option value="'Courier New', monospace">Courier New</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Padding: <span id="paddingValue" class="text-homarr-100">24</span>px</label>
                    <input type="range" id="padding" min="12" max="48" value="24" class="w-full">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-homarr-200 mb-2">Border Radius: <span id="radiusValue" class="text-homarr-100">16</span>px</label>
                    <input type="range" id="borderRadius" min="4" max="32" value="16" class="w-full">
                </div>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button id="applySettings" class="flex-1 bg-homarr-500 hover:bg-homarr-400 text-homarr-100 font-semibold rounded-lg px-4 py-3 text-sm transition-all">Apply</button>
                <button id="closeSettings" class="flex-1 bg-transparent border border-homarr-500 hover:bg-homarr-600 text-homarr-200 font-medium rounded-lg px-4 py-3 text-sm transition-all">Close</button>
            </div>
        </div>
    </div>

    <script>
        const units = {
            length: ['Meter', 'Kilometer', 'Centimeter', 'Millimeter', 'Mile', 'Yard', 'Foot', 'Inch'],
            weight: ['Kilogram', 'Gram', 'Milligram', 'Pound', 'Ounce', 'Ton'],
            temperature: ['Celsius', 'Fahrenheit', 'Kelvin'],
            volume: ['Liter', 'Milliliter', 'Gallon', 'Quart', 'Pint', 'Cup', 'Fluid Ounce'],
            area: ['Square Meter', 'Square Kilometer', 'Square Foot', 'Square Yard', 'Acre', 'Hectare'],
            speed: ['m/s', 'km/h', 'mph', 'knot'],
            time: ['Second', 'Minute', 'Hour', 'Day', 'Week', 'Month', 'Year']
        };

        const conversions = {
            length: { 'Meter': 1, 'Kilometer': 1000, 'Centimeter': 0.01, 'Millimeter': 0.001, 'Mile': 1609.344, 'Yard': 0.9144, 'Foot': 0.3048, 'Inch': 0.0254 },
            weight: { 'Kilogram': 1, 'Gram': 0.001, 'Milligram': 0.000001, 'Pound': 0.453592, 'Ounce': 0.0283495, 'Ton': 1000 },
            volume: { 'Liter': 1, 'Milliliter': 0.001, 'Gallon': 3.78541, 'Quart': 0.946353, 'Pint': 0.473176, 'Cup': 0.236588, 'Fluid Ounce': 0.0295735 },
            area: { 'Square Meter': 1, 'Square Kilometer': 1000000, 'Square Foot': 0.092903, 'Square Yard': 0.836127, 'Acre': 4046.86, 'Hectare': 10000 },
            speed: { 'm/s': 1, 'km/h': 0.277778, 'mph': 0.44704, 'knot': 0.514444 },
            time: { 'Second': 1, 'Minute': 60, 'Hour': 3600, 'Day': 86400, 'Week': 604800, 'Month': 2629746, 'Year': 31556952 }
        };

        const categorySelect = document.getElementById('category');
        const fromUnitSelect = document.getElementById('fromUnit');
        const toUnitSelect = document.getElementById('toUnit');
        const fromValueInput = document.getElementById('fromValue');
        const resultDiv = document.getElementById('result');
        const convertBtn = document.getElementById('convertBtn');

        Object.keys(units).forEach(cat => categorySelect.add(new Option(cat.charAt(0).toUpperCase() + cat.slice(1), cat)));

        function updateUnits() {
            const category = categorySelect.value;
            const unitList = units[category];
            fromUnitSelect.innerHTML = '';
            toUnitSelect.innerHTML = '';
            unitList.forEach(unit => {
                fromUnitSelect.add(new Option(unit, unit));
                toUnitSelect.add(new Option(unit, unit));
            });
            if (unitList.length > 1) toUnitSelect.selectedIndex = 1;
            resultDiv.textContent = '-';
        }

        function convertTemperature(value, from, to) {
            let celsius = from === 'Celsius' ? value : from === 'Fahrenheit' ? (value - 32) * 5/9 : value - 273.15;
            return to === 'Celsius' ? celsius : to === 'Fahrenheit' ? celsius * 9/5 + 32 : celsius + 273.15;
        }

        function convert() {
            const value = parseFloat(fromValueInput.value);
            if (isNaN(value)) { resultDiv.textContent = 'Enter a valid number'; return; }
            const category = categorySelect.value;
            const from = fromUnitSelect.value;
            const to = toUnitSelect.value;
            const result = category === 'temperature' ? convertTemperature(value, from, to) : (value * conversions[category][from]) / conversions[category][to];
            resultDiv.textContent = result.toLocaleString(undefined, { maximumFractionDigits: 6 });
        }

        categorySelect.addEventListener('change', updateUnits);
        convertBtn.addEventListener('click', convert);
        fromValueInput.addEventListener('input', convert);
        fromUnitSelect.addEventListener('change', convert);
        toUnitSelect.addEventListener('change', convert);
        updateUnits();

        const copyBtn = document.getElementById('copyBtn');
        copyBtn.addEventListener('click', () => {
            const text = resultDiv.textContent;
            if (text && text !== '-' && text !== 'Enter a valid number') {
                navigator.clipboard.writeText(text);
                copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                setTimeout(() => { copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>'; }, 1500);
            }
        });

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettings = document.getElementById('closeSettings');
        const applySettings = document.getElementById('applySettings');
        const paddingSlider = document.getElementById('padding');
        const radiusSlider = document.getElementById('borderRadius');
        const paddingValue = document.getElementById('paddingValue');
        const radiusValue = document.getElementById('radiusValue');
        const bgColorInput = document.getElementById('bgColor');
        const textColorInput = document.getElementById('textColor');
        const bgColorHex = document.getElementById('bgColorHex');
        const textColorHex = document.getElementById('textColorHex');

        paddingSlider.addEventListener('input', () => paddingValue.textContent = paddingSlider.value);
        radiusSlider.addEventListener('input', () => radiusValue.textContent = radiusSlider.value);
        bgColorInput.addEventListener('input', () => bgColorHex.textContent = bgColorInput.value);
        textColorInput.addEventListener('input', () => textColorHex.textContent = textColorInput.value);

        settingsBtn.addEventListener('click', () => settingsModal.classList.remove('hidden'));
        closeSettings.addEventListener('click', () => settingsModal.classList.add('hidden'));
        settingsModal.addEventListener('click', e => { if (e.target === settingsModal) settingsModal.classList.add('hidden'); });

        applySettings.addEventListener('click', () => {
            document.body.style.backgroundColor = bgColorInput.value;
            document.body.style.color = textColorInput.value;
            document.body.style.fontFamily = document.getElementById('fontFamily').value;
            const container = document.querySelector('.bg-homarr-700');
            container.style.padding = paddingSlider.value + 'px';
            container.style.borderRadius = radiusSlider.value + 'px';
            settingsModal.classList.add('hidden');
        });
    </script>
</body>
</html>
